rules:
  - id: custom.sql-fstring
    severity: ERROR
    languages: [python]
    message: Une requête SQL construite par f-string permet une injection SQL.
    metadata:
      cwe: CWE-89
    patterns:
      - pattern: cursor.execute(f"...")

  - id: custom.subprocess-shell-true
    severity: WARNING
    languages: [python]
    message: L'appel à subprocess.run avec shell=True peut permettre une injection de commande.
    metadata:
      cwe: CWE-78
    patterns:
      - pattern: subprocess.run(..., shell=True, ...)

  - id: custom.unsafe-yaml
    severity: ERROR
    languages: [python]
    message: yaml.load sans Loader explicite peut exécuter du code arbitraire à la désérialisation.
    metadata:
      cwe: CWE-502
    patterns:
      - pattern: yaml.load($DATA)

  - id: custom.weak-random
    severity: WARNING
    languages: [python]
    message: random.random n'est pas cryptographiquement sûr pour générer un secret ou un token.
    metadata:
      cwe: CWE-330
    patterns:
      - pattern: random.random()
